<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mind Companion — Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root { --ink:#3D2C35; --muted:#9B8EA0; --cream:#FFF8F0; --purple:#8570CF; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'DM Sans',sans-serif; background:var(--cream); min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.5rem;
    }
    .bg-mesh {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(ellipse 70% 55% at 15% 20%, #FFE4EC44 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 15%, #D4F5EC44 0%, transparent 55%),
        radial-gradient(ellipse 55% 60% at 80% 85%, #E8D5F544 0%, transparent 60%),
        var(--cream);
    }
    .card {
      position:relative; z-index:2;
      background:rgba(255,255,255,0.85); backdrop-filter:blur(12px);
      border:1.5px solid rgba(255,255,255,0.95); border-radius:28px;
      padding:2.5rem 2rem; width:100%; max-width:440px;
      box-shadow:0 16px 48px rgba(0,0,0,0.1);
    }
    .brand {
      font-family:'Baloo 2',sans-serif; font-weight:900; font-size:1.15rem;
      color:var(--purple); text-decoration:none;
      display:flex; align-items:center; gap:0.35rem; justify-content:center; margin-bottom:1.5rem;
    }
    .icon { font-size:2.5rem; text-align:center; margin-bottom:0.6rem; }
    h1 {
      font-family:'Baloo 2',sans-serif; font-weight:900; font-size:1.5rem;
      color:var(--ink); text-align:center; margin-bottom:0.4rem;
    }
    .sub { font-size:0.82rem; color:var(--muted); text-align:center; margin-bottom:1.8rem; line-height:1.5; }
    .field { margin-bottom:1.2rem; }
    label { display:block; font-size:0.78rem; font-weight:500; color:var(--ink); margin-bottom:0.35rem; }
    .mc-input {
      width:100%; padding:0.65rem 0.9rem;
      border:1.5px solid #E8DFF0; border-radius:12px;
      font-family:'DM Sans',sans-serif; font-size:0.88rem; color:var(--ink);
      background:rgba(255,255,255,0.9); outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .mc-input:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(133,112,207,0.15); }
    .submit-btn {
      width:100%; padding:0.85rem;
      background:linear-gradient(135deg,#8570CF,#C7A0EA); color:white;
      font-family:'Baloo 2',sans-serif; font-weight:800; font-size:0.95rem;
      border:none; border-radius:999px; cursor:pointer;
      box-shadow:0 5px 18px rgba(133,112,207,0.35);
      transition:transform 0.18s, box-shadow 0.18s;
    }
    .submit-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(133,112,207,0.45); }
    .back-link {
      display:block; text-align:center; margin-top:1.1rem;
      font-size:0.78rem; color:var(--muted); text-decoration:none; transition:color 0.18s;
    }
    .back-link:hover { color:var(--ink); }
  </style>
</head>
<body>
<div class="bg-mesh"></div>

<div class="card">
  <a href="{% url 'wellness:landing' %}" class="brand">🌸 Mind Companion</a>
  <div class="icon">🔑</div>
  <h1>Reset your password</h1>
  <p class="sub">Enter the email address linked to your account and we'll send you a reset link.</p>

  <form method="post" novalidate>
    {% csrf_token %}
    <div class="field">
      <label for="id_email">Email address</label>
      <input type="email" name="email" id="id_email"
             class="mc-input" placeholder="your@email.com" autocomplete="email" required/>
    </div>
    <button type="submit" class="submit-btn">Send Reset Link</button>
  </form>

  <a href="{% url 'wellness:login' %}" class="back-link">← Back to login</a>
</div>
</body>
</html>
