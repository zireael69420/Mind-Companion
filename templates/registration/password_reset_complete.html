<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mind Companion — Password Reset Complete</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root { --ink:#3D2C35; --muted:#9B8EA0; --cream:#FFF8F0; --purple:#8570CF; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'DM Sans',sans-serif; background:var(--cream); min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.5rem;
    }
    .bg-mesh {
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background:
        radial-gradient(ellipse 70% 55% at 15% 20%, #FFE4EC44 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 15%, #D4F5EC44 0%, transparent 55%),
        radial-gradient(ellipse 55% 60% at 80% 85%, #E8D5F544 0%, transparent 60%),
        var(--cream);
    }
    .card {
      position:relative; z-index:2;
      background:rgba(255,255,255,0.85); backdrop-filter:blur(12px);
      border:1.5px solid rgba(255,255,255,0.95); border-radius:28px;
      padding:2.5rem 2rem; width:100%; max-width:440px;
      box-shadow:0 16px 48px rgba(0,0,0,0.1); text-align:center;
    }
    .brand {
      font-family:'Baloo 2',sans-serif; font-weight:900; font-size:1.15rem;
      color:var(--purple); text-decoration:none;
      display:flex; align-items:center; gap:0.35rem; justify-content:center; margin-bottom:1.5rem;
    }
    .icon { font-size:3rem; margin-bottom:0.75rem; }
    h1 {
      font-family:'Baloo 2',sans-serif; font-weight:900; font-size:1.5rem;
      color:var(--ink); margin-bottom:0.6rem;
    }
    .body-text { font-size:0.85rem; color:var(--muted); line-height:1.65; margin-bottom:1.8rem; }
    .login-btn {
      display:block; width:100%; padding:0.85rem;
      background:linear-gradient(135deg,#8570CF,#C7A0EA); color:white;
      font-family:'Baloo 2',sans-serif; font-weight:800; font-size:0.95rem;
      border:none; border-radius:999px; text-decoration:none; text-align:center;
      box-shadow:0 5px 18px rgba(133,112,207,0.35);
      transition:transform 0.18s, box-shadow 0.18s;
    }
    .login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(133,112,207,0.45); }
  </style>
</head>
<body>
<div class="bg-mesh"></div>

<div class="card">
  <a href="{% url 'wellness:landing' %}" class="brand">🌸 Mind Companion</a>
  <div class="icon">✅</div>
  <h1>Password updated!</h1>
  <p class="body-text">
    Your password has been set successfully. You can now log in with your new password.
  </p>
  <a href="{% url 'wellness:login' %}" class="login-btn">Log In 🌸</a>
</div>
</body>
</html>
